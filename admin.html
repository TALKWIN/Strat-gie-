<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espace Admin — La Table des Stratèges</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♟</text></svg>">
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar" role="navigation" aria-label="Navigation principale">
    <div class="navbar-brand">
      <div class="navbar-logo-icon">♟</div>
      <span class="navbar-title">La <em>Table</em> des Stratèges</span>
    </div>
    <button class="navbar-toggle" id="navbar-toggle" aria-label="Menu">☰</button>
    <ul class="navbar-nav" id="navbar-nav">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="classement.html">Classement</a></li>
      <li><a href="annonces.html">Annonces</a></li>
      <li><a href="activites.html">Activités</a></li>
    </ul>
  </nav>

  <main class="admin-login">
    <div class="admin-card">
      <div style="text-align:center;font-size:40px;margin-bottom:20px;">⚙</div>
      <h1 class="admin-title" style="text-align:center;">Espace Admin</h1>
      <p class="admin-sub" style="text-align:center;">
        Accès réservé aux administrateurs du club.<br>
        Mot de passe requis pour continuer.
      </p>

      <div id="admin-form">
        <div class="form-group">
          <label class="form-label" for="admin-pass">Mot de passe</label>
          <input
            type="password"
            id="admin-pass"
            class="form-control"
            placeholder="••••••••••••"
            autocomplete="current-password"
          >
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="verifierAdmin()">
          Accéder au panneau →
        </button>
        <p id="admin-msg" style="text-align:center;margin-top:14px;font-size:13px;font-weight:500;"></p>
      </div>

      <div style="margin-top:32px;padding-top:24px;border-top:1px solid var(--gris-clair);text-align:center;">
        <a href="index.html" style="font-size:13px;color:var(--gris-moyen);">← Retour au site</a>
      </div>
    </div>
  </main>

  <!-- ── FOOTER ── -->
  <footer role="contentinfo" style="margin-top:0;">
    <div class="footer-inner">
      <span class="footer-brand">La Table des Stratèges © 2025</span>
      <span class="footer-admin" style="color:rgba(255,255,255,0.15);">Panneau d'administration</span>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    function verifierAdmin() {
      const pass = document.getElementById('admin-pass').value;
      const msg  = document.getElementById('admin-msg');
      if (pass === 'stratege2025') {
        msg.textContent = '✓ Accès autorisé. Interface d\'administration en cours de développement.';
        msg.style.color = '#2A6049';
      } else {
        msg.textContent = '✗ Mot de passe incorrect. Veuillez réessayer.';
        msg.style.color = '#8B2635';
        document.getElementById('admin-pass').value = '';
      }
    }
    document.getElementById('admin-pass').addEventListener('keypress', e => {
      if (e.key === 'Enter') verifierAdmin();
    });
  </script>
</body>
</html>
